
[coreRenderer]
	#Render the animated hologram above faction cores.
	enableCoreHologram = true
	#Global client-side scale multiplier for the faction core hologram.
	#Range: 0.5 ~ 2.5
	coreHologramScale = 1.0
	#Render the world-space radius ring around nearby faction cores.
	enableCoreZoneRing = true
	#Opacity multiplier for the world-space core radius ring.
	#Range: 0.05 ~ 1.0
	coreZoneRingAlpha = 0.65

[raidVisuals]
	#Render red/blue raid highlights around active participants.
	enableRaidPlayerHighlights = true
	#Render the raid banner HUD while you are part of an active raid.
	enableRaidHud = true
	#Global client-side scale multiplier for the raid HUD.
	#Range: 0.7 ~ 2.0
	raidHudScale = 1.0
	#Play client-side raid ambience while you are in range of an active raid core.
	enableRaidMusic = true
	#Sound event id used for the looping raid ambience.
	raidMusicSound = "minecraft:music.dragon"
	#Client-side volume multiplier for raid ambience.
	#Range: 0.0 ~ 2.0
	raidMusicVolume = 0.42
	#Maximum range from the raid core where the ambience can be heard.
	#Range: 8 ~ 192
	raidMusicRange = 48

